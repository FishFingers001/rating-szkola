<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta author="Olivier Michałowski 3G">
    <title>Ankieta Dni Otwarte</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .stars { font-size: 50px; color: #475569; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .stars span.active { color: #fbbf24; }
        .stars span:hover { transform: scale(1.2); display: inline-block; }

        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: none; background: #334155; color: white; box-sizing: border-box; outline: none; }
        input:focus { ring: 2px solid #3b82f6; }
        
        button { background: #3b82f6; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        button:hover { background: #2563eb; }
        button:disabled { background: #64748b; cursor: not-allowed; }

        .stats { margin-top: 40px; border-top: 1px solid #334155; padding-top: 20px; }
        #srednia { font-size: 70px; font-weight: 800; color: #3b82f6; margin: 5px 0; }
        #total-votes { color: #94a3b8; margin-bottom: 20px; }
        
        #comments-list { text-align: left; }
        .comment { background: #334155; padding: 12px; margin: 10px 0; border-radius: 8px; font-size: 14px; border-left: 4px solid #3b82f6; animation: fadeIn 0.5s ease; }
        .comment-stars { color: #fbbf24; font-size: 12px; margin-bottom: 5px; letter-spacing: 2px; text-align: right;}
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Jak Ci się podoba?</h2>
    
    <div class="stars" id="star-rating">
        <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span>
    </div>
    
    <input type="text" id="user-comment" placeholder="Napisz coś od siebie (opcjonalnie)...">
    <button id="send-btn" onclick="saveVote()">Wyślij głos</button>

    <div class="stats">
        <p>Średnia ocena:</p>
        <div id="srednia">0.0</div>
        <p id="total-votes">Głosów: 0</p>
        <div id="comments-list"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://jkkzttutnglikjmayylf.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Od6u_x6DIdKUdQOuqRalcw_dtAzhCuy';
    const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentRating = 0;

    function setRating(n) {
        currentRating = n;
        const stars = document.querySelectorAll('.stars span');
        stars.forEach((s, i) => {
            if (i < n) s.classList.add('active');
            else s.classList.remove('active');
        });
    }

    async function saveVote() {
        if (currentRating === 0) return alert("Wybierz gwiazdki!");
        const btn = document.getElementById('send-btn');
        const comm = document.getElementById('user-comment').value;

        btn.disabled = true;
        btn.innerText = "Wysyłanie...";

        const { error } = await sbClient
            .from('opinie')
            .insert([{ gwiazdki: currentRating, komentarz: comm }]);

        if (error) {
            alert("Błąd bazy danych!");
            console.error(error);
        } else {
            alert("Dzięki za głos!");
            document.getElementById('user-comment').value = '';
            setRating(0);
            loadData(); 
        }
        btn.disabled = false;
        btn.innerText = "Wyślij głos";
    }

    async function loadData() {
        const { data, error } = await sbClient
            .from('opinie')
            .select('*')
            .order('id', { ascending: false });

        if (error) {
            console.error("Błąd pobierania:", error);
            return;
        }

        if (data) {
            const count = data.length;
            const avg = count > 0 ? (data.reduce((acc, item) => acc + item.gwiazdki, 0) / count).toFixed(1) : "0.0";
            
            document.getElementById('srednia').innerText = avg;
            document.getElementById('total-votes').innerText = `Głosów: ${count}`;
            
            const commentsHtml = data
                .filter(i => i.komentarz && i.komentarz.trim() !== "")
                .slice(0, 5)
                .map(i => {
                    const starsLine = '★'.repeat(i.gwiazdki) + '☆'.repeat(5 - i.gwiazdki);
                    return `
                        <div class="comment">
                            ${i.komentarz}
                            <span class="comment-stars">${starsLine}</div>
                        </div>
                    `;
                })
                .join('');
            
            document.getElementById('comments-list').innerHTML = commentsHtml;
        }
    }

    setInterval(loadData, 5000);
    window.onload = loadData;
</script>

</body>
</html>
