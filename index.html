<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankieta Dni Otwarte</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .stars { font-size: 40px; color: #64748b; cursor: pointer; transition: 0.2s; }
        .stars span.active { color: #fbbf24; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: none; background: #334155; color: white; box-sizing: border-box; }
        button { background: #3b82f6; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .stats { margin-top: 40px; border-top: 1px solid #334155; padding-top: 20px; }
        #srednia { font-size: 60px; font-weight: 800; color: #3b82f6; margin: 10px 0; }
        .comment { background: #334155; padding: 10px; margin: 10px 0; border-radius: 8px; text-align: left; font-size: 14px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Jak Ci się podoba?</h2>
    <div class="stars" id="star-rating">
        <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span>
    </div>
    <input type="text" id="user-comment" placeholder="Dodaj krótki komentarz...">
    <button onclick="saveVote()">Wyślij głos</button>

    <div class="stats">
        <p>Średnia ocena:</p>
        <div id="srednia">0.0</div>
        <p id="total-votes">Głosów: 0</p>
        <div id="comments-list"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'TWOJ_URL_Z_SUPABASE';
    const SUPABASE_KEY = 'TWOJ_ANON_KEY_Z_SUPABASE';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentRating = 0;

    function setRating(n) {
        currentRating = n;
        const stars = document.querySelectorAll('.stars span');
        stars.forEach((s, i) => s.classList.toggle('active', i < n));
    }

    async function saveVote() {
        if(currentRating === 0) return alert("Wybierz gwiazdki!");
        const comm = document.getElementById('user-comment').value;

        const { error } = await supabase.from('opinie').insert([{ gwiazdki: currentRating, komentarz: comm }]);
        if(!error) {
            alert("Dziękujemy!");
            document.getElementById('user-comment').value = '';
            setRating(0);
            loadData();
        }
    }

    async function loadData() {
        const { data, error } = await supabase.from('opinie').select('*').order('created_at', { ascending: false });
        if(data) {
            const count = data.length;
            const avg = count > 0 ? (data.reduce((acc, item) => acc + item.gwiazdki, 0) / count).toFixed(1) : "0.0";
            
            document.getElementById('srednia').innerText = avg;
            document.getElementById('total-votes').innerText = `Głosów: ${count}`;
            
            const commentsHtml = data.slice(0, 3).map(i => i.komentarz ? `<div class="comment">${i.komentarz}</div>` : '').join('');
            document.getElementById('comments-list').innerHTML = commentsHtml;
        }
    }

    // Odświeżaj dane co 5 sekund automatycznie
    setInterval(loadData, 5000);
    loadData();
</script>

</body>
</html>
